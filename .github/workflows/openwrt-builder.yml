name: Build OpenWrt for 360 V6

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/openwrt-builder.yml'
      - '.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🗑️ Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3 python3-pip rsync swig unzip zlib1g-dev wget curl ca-certificates file

      - name: 📥 Clone Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: 📦 Install Custom Packages
        run: |
          cd openwrt
          rm -rf package/luci-theme-argon package/homeproxy
          git clone --depth 1 https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon
          git clone --depth 1 https://github.com/immortalwrt/homeproxy.git package/homeproxy

      - name: 🔄 Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ⚙️ Apply Config & Hard-Lock Device
        run: |
          cd openwrt

          # 1. 移除 sing-box-tiny 冲突项
          SINGBOX_MK="feeds/packages/net/sing-box/Makefile"
          if [ -f "$SINGBOX_MK" ]; then
            sed -i '/define Package\/sing-box-tiny/,/endef/d' "$SINGBOX_MK"
            sed -i '/BuildPackage,sing-box-tiny/d' "$SINGBOX_MK"
            echo "✅ 已移除 sing-box-tiny"
          fi

          # 2. 【核弹级修复】修改 Kconfig 源码，强制 360 V6 为默认设备
          CONFIG_IN="target/linux/qualcommax/ipq60xx/Config.in"
          if [ -f "$CONFIG_IN" ]; then
            # 移除 8devices 的默认标记
            sed -i '/config TARGET_qualcommax_ipq60xx_DEVICE_8devices_mango-dvk/,/endconfig/ s/default y/default n/' "$CONFIG_IN"
            # 为 360 V6 添加默认标记
            if ! grep -A 3 "config TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6" "$CONFIG_IN" | grep -q "default y"; then
              sed -i '/config TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6/a\\tdefault y' "$CONFIG_IN"
            fi
            echo "✅ 已修改 Config.in 默认设备"
          fi

          # 3. 载入仓库配置
          cp "${GITHUB_WORKSPACE}/.config" .config

          # 4. 清除旧设备行
          sed -i '/^CONFIG_TARGET_MULTI_PROFILE/d' .config
          sed -i '/^CONFIG_TARGET_DEVICE="/d' .config
          sed -i '/^CONFIG_TARGET_DEVICE_OPT="/d' .config
          sed -i '/^CONFIG_TARGET_DEVICE_PACKAGES_/d' .config
          sed -i '/^CONFIG_TARGET_.*_DEVICE_.*/d' .config

          # 5. 注入设备配置
          echo 'CONFIG_TARGET_MULTI_PROFILE=n' >> .config
          echo 'CONFIG_TARGET_DEVICE="qihoo_360v6"' >> .config
          echo 'CONFIG_TARGET_DEVICE_OPT="qihoo_360v6"' >> .config
          echo 'CONFIG_TARGET_qualcommax=y' >> .config
          echo 'CONFIG_TARGET_qualcommax_ipq60xx=y' >> .config
          echo 'CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y' >> .config
          echo 'CONFIG_TARGET_DEVICE_PACKAGES_qihoo_360v6=""' >> .config

          # 6. 生成配置
          make olddefconfig >/dev/null 2>&1 || true

          # 7. 最终校验
          if grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "✅ 目标设备 100% 锁定：qihoo_360v6"
          else
            echo "❌ 设备锁定失败，实际选中："
            grep "CONFIG_TARGET_.*_DEVICE_.*=y" .config
            exit 1
          fi

      - name: ⬇️ Download Feeds & Packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 🔨 Compile Firmware
        id: compile
        run: |
          cd openwrt
          echo "🔨 开始编译 ($(nproc) 线程)..."
          if make -j$(nproc) V=s 2>&1 | tee build.log; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 多线程失败，降级单线程..."
            if make -j1 V=s 2>&1 | tee -a build.log; then
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "status=failure" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

      - name: 📦 Prepare Artifacts & Verify Target
        if: steps.compile.outputs.status == 'success'
        run: |
          TARGET_DIR="openwrt/bin/targets/qualcommax/ipq60xx"
          if [ ! -d "$TARGET_DIR" ]; then
            echo "❌ 目标目录不存在，实际路径:"
            find openwrt/bin/targets -type d -maxdepth 2
            exit 1
          fi
          cd "$TARGET_DIR"
          
          echo "📂 编译输出目录内容:"
          ls -lh
          
          mkdir -p output
          cp *qihoo_360v6* output/ 2>/dev/null || true
          cp sha256sums output/ 2>/dev/null || true
          
          if ! ls output/*qihoo_360v6* >/dev/null 2>&1; then
            echo "❌ 未生成 360 V6 固件！"
            echo "💡 请检查上方编译日志，确认实际编译设备"
            exit 1
          fi
          
          echo "✅ 固件验证通过"
          ls -lh output/
          echo "FIRMWARE_PATH=$PWD/output" >> $GITHUB_ENV

      - name: 🚀 Upload to Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-v${{ github.run_number }}
          name: OpenWrt 360 V6 (${{ env.BUILD_DATE }})
          body: |
            ## 📦 OpenWrt for 360 V6 (Qualcomm IPQ60xx)
            - **版本**: OpenWrt 24.10 (Stable)
            - **构建时间**: ${{ env.BUILD_DATE }}
            - **源码 Commit**: ${{ env.OPENWRT_COMMIT }}

            ### ✨ 已内置
            - ✅ 中文界面 + Argon 主题
            - ✅ HomeProxy + sing-box (已解决 choice 冲突)
            - ✅ ttyd 网页终端
            - ✅ USB 3.0 驱动 + ath11k 无线
          files: ${{ env.FIRMWARE_PATH }}/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: openwrt/build.log
          retention-days: 7
