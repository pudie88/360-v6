name: Build OpenWrt for 360 V6

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/openwrt-builder.yml'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🗑️ 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/lib/jvm
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get autoremove -y --purge
          sudo apt-get clean
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          df -h

      - name: 🛠️ 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-pip rsync \
            swig unzip zlib1g-dev wget curl ca-certificates file
          sudo timedatectl set-timezone "$TZ"

      - name: 📥 克隆 OpenWrt 源码
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d')" >> $GITHUB_ENV

      - name: 📦 安装第三方插件
        env:
          GIT_TERMINAL_PROMPT: "0"
        run: |
          cd openwrt

          gh_download() {
            local url="$1"
            local dest="$2"
            local tmp
            tmp=$(mktemp /tmp/pkg_XXXXXX.tar.gz)
            echo ">>> 下载: $url"
            curl -L -s \
              --retry 3 \
              --retry-delay 5 \
              -H "User-Agent: Mozilla/5.0 (GitHub Actions OpenWrt Builder)" \
              -o "$tmp" \
              "$url"
            if ! file "$tmp" | grep -q "gzip compressed"; then
              echo "❌ 下载失败，实际内容："
              head -5 "$tmp"
              rm -f "$tmp"
              return 1
            fi
            mkdir -p "$dest"
            tar -xzf "$tmp" -C "$dest" --strip-components=1
            rm -f "$tmp"
            echo "✅ 安装完成: $dest"
          }

          gh_download \
            "https://github.com/Openwrt-Passwall/openwrt-passwall/archive/refs/heads/main.tar.gz" \
            "package/luci-app-passwall"

          gh_download \
            "https://github.com/Openwrt-Passwall/openwrt-passwall-packages/archive/refs/heads/main.tar.gz" \
            "package/passwall-packages"

          rm -rf package/lean/luci-theme-argon 2>/dev/null || true
          gh_download \
            "https://github.com/jerrykuku/luci-theme-argon/archive/refs/heads/master.tar.gz" \
            "package/luci-theme-argon"

      - name: 🔄 更新 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ⚙️ 配置编译目标
        run: |
          cd openwrt

          {
            echo "CONFIG_TARGET_qualcommax=y"
            echo "CONFIG_TARGET_qualcommax_ipq60xx=y"
            echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y"
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=100"
            echo "CONFIG_CCACHE=y"
            echo "CONFIG_SSTRIP=y"
            echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y"
            echo "CONFIG_PACKAGE_luci=y"
            echo "CONFIG_PACKAGE_luci-base=y"
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lib-ipkg=y"
            echo "CONFIG_PACKAGE_luci-ssl=y"
            echo "CONFIG_PACKAGE_luci-theme-bootstrap=y"
            echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y"
            echo "CONFIG_PACKAGE_dnsmasq-full=y"
            echo "# CONFIG_PACKAGE_dnsmasq is not set"
            echo "CONFIG_PACKAGE_firewall4=y"
            echo "CONFIG_PACKAGE_nftables=y"
            echo "CONFIG_PACKAGE_kmod-nft-offload=y"
            echo "CONFIG_PACKAGE_opkg=y"
            echo "CONFIG_PACKAGE_kmod-ath11k=y"
            echo "CONFIG_PACKAGE_kmod-ath10k-ct=y"
            echo "CONFIG_PACKAGE_ath11k-firmware-qcn9074=y"
            echo "CONFIG_PACKAGE_luci-app-passwall=y"
            echo "CONFIG_PACKAGE_luci-app-ttyd=y"
            echo "CONFIG_PACKAGE_curl=y"
            echo "CONFIG_PACKAGE_wget-ssl=y"
            echo "CONFIG_PACKAGE_htop=y"
            echo "CONFIG_PACKAGE_bash=y"
            echo "CONFIG_PACKAGE_file=y"
            echo "# CONFIG_PACKAGE_luci-app-adguardhome is not set"
            echo "# CONFIG_PACKAGE_luci-app-openclash is not set"
            echo "# CONFIG_PACKAGE_luci-app-mosdns is not set"
            echo "# CONFIG_PACKAGE_v2ray-geoip is not set"
            echo "# CONFIG_PACKAGE_v2ray-geosite is not set"
            echo "# CONFIG_PACKAGE_docker is not set"
            echo "# CONFIG_PACKAGE_xray-core is not set"
            echo "# CONFIG_PACKAGE_sing-box is not set"
            echo "# CONFIG_PACKAGE_hysteria is not set"
            echo "# CONFIG_PACKAGE_naiveproxy is not set"
            echo "# CONFIG_PACKAGE_tuic-client is not set"
          } > .config

          echo "=== 第一次 defconfig 前验证 ==="
          grep "CONFIG_TARGET_qualcommax" .config && echo "目标写入成功" || echo "目标写入失败"

          make defconfig

          echo "=== 第一次 defconfig 后验证 ==="
          grep "CONFIG_TARGET_qualcommax" .config || echo "被覆盖了"

          # 强制把目标写回
          grep -v "^CONFIG_TARGET_" .config > .config.tmp
          {
            echo "CONFIG_TARGET_qualcommax=y"
            echo "CONFIG_TARGET_qualcommax_ipq60xx=y"
            echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y"
          } >> .config.tmp
          mv .config.tmp .config

          # 再跑一次 defconfig 让其他依赖基于正确目标展开
          make defconfig

          echo "=== 最终验证 ==="
          grep "CONFIG_TARGET_qualcommax" .config || echo "⚠️ 未找到 qualcommax 目标配置"
          grep "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6" .config || echo "⚠️ 未找到 360V6 设备配置"
          grep "CONFIG_TARGET_BOARD" .config || echo "⚠️ 未找到 BOARD 配置"

      - name: ⬇️ 下载编译所需软件包
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 🔨 编译固件
        id: compile
        run: |
          cd openwrt
          echo "🔨 开始编译，使用 $(nproc) 线程..."
          make -j$(nproc) V=s 2>&1 | tee build.log

          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ 编译成功！"
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "❌ 编译失败，最后 50 行："
            tail -50 build.log
            exit 1
          fi

      - name: 📦 整理固件文件
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
          echo "=== 固件文件列表 ==="
          ls -lh *.bin 2>/dev/null || echo "⚠️ 未找到 .bin 文件"

      - name: 📤 上传固件到 Artifacts
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-360V6-${{ github.run_number }}
          path: ${{ env.FIRMWARE_PATH }}/*.bin
          retention-days: 7

      - name: 🚀 发布到 Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: ${{ env.FIRMWARE_PATH }}/*squashfs*.bin
          body: |
            ## OpenWrt for 360 V6 (Qualcomm IPQ60xx)
            - 分支: ${{ env.REPO_BRANCH }}
            - 源码 Commit: ${{ env.OPENWRT_COMMIT }}
            - 构建编号: ${{ github.run_number }}
            - 构建日期: ${{ env.BUILD_DATE }}

            ### 内置插件
            - PassWall（科学上网）
            - ttyd（网页终端）
            - Argon 主题
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 上传编译日志（始终执行）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: openwrt/build.log
          retention-days: 3
          if-no-files-found: ignore
