name: Build OpenWrt for 360 V6

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/openwrt-builder.yml'
      - '.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🗑️ Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile
          df -h

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-pip rsync \
            swig unzip zlib1g-dev wget curl ca-certificates file

      - name: 📥 Clone Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: 📦 Install Custom Packages
        run: |
          cd openwrt
          rm -rf package/luci-theme-argon package/homeproxy
          git clone --depth 1 --branch master --single-branch \
            https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon
          git clone --depth 1 --branch master --single-branch \
            https://github.com/immortalwrt/homeproxy.git package/homeproxy

      - name: 🔄 Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ⚙️ Apply Config & Fix Kconfig Conflicts (仅一次 defconfig)
        run: |
          cd openwrt

          # 🔧 1. 根除 sing-box-tiny choice 循环依赖
          # 直接从 feeds Makefile 中删除 tiny 变体定义，彻底破坏 choice 块
          SINGBOX_MK=$(find feeds -name "Makefile" -path "*/net/sing-box/*" | head -1)
          if [ -f "$SINGBOX_MK" ]; then
            sed -i '/^define Package\/sing-box-tiny$/,/^endef$/d' "$SINGBOX_MK"
            echo "✅ 已彻底移除 sing-box-tiny 变体，解除 choice 互斥死锁"
          fi

          # 🔧 2. 写入完整配置（仓库 .config + 强制设备锁定行）
          # 将目标配置追加到文件末尾，确保 defconfig 解析时优先级最高
          cp ../.config .config
          cat >> .config << 'CFGEOF'
          # === 强制设备选择 (防止 defconfig 回退到默认 ath79) ===
          CONFIG_TARGET_MULTI_PROFILE=n
          CONFIG_TARGET_DEVICE="qihoo_360v6"
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq60xx=y
          CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y
          # === sing-box 显式指定 (此时 tiny 已删除，不再冲突) ===
          CONFIG_PACKAGE_sing-box=y
          CFGEOF

          # 🔧 3. 仅执行一次 make defconfig
          echo "🔄 执行 make defconfig (仅此一次)..."
          make defconfig 2>&1 | grep -E "^(override|WARNING|error)" || true

          # 🔧 4. 最终校验
          if ! grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "❌ 目标设备丢失！当前配置："
            grep "CONFIG_TARGET_" .config | grep "=y" || echo "(无)"
            exit 1
          fi
          echo "✅ Kconfig 冲突已彻底解决，配置 100% 锁定"

      - name: ⬇️ Download Feeds & Packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 🔨 Compile Firmware
        id: compile
        run: |
          cd openwrt
          echo "🔨 开始编译 ($(nproc) 线程)..."
          if make -j$(nproc) V=s 2>&1 | tee build.log; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 多线程失败，降级单线程..."
            if make -j1 V=s 2>&1 | tee -a build.log; then
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "status=failure" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

      - name: 📦 Prepare Artifacts
        if: steps.compile.outputs.status == 'success'
        run: |
          TARGET_DIR=$(find openwrt/bin/targets -mindepth 2 -maxdepth 2 -type d | head -1)
          mkdir -p "$TARGET_DIR/output"
          cd "$TARGET_DIR"
          cp *qihoo_360v6* output/ 2>/dev/null || true
          cp sha256sums output/ 2>/dev/null || true
          if [ -z "$(ls output/ 2>/dev/null)" ]; then
            echo "❌ 未找到 360 V6 固件！"
            exit 1
          fi
          echo "✅ 固件文件："
          ls -lh output/
          echo "FIRMWARE_PATH=$PWD/output" >> $GITHUB_ENV

      - name: 🚀 Upload to Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-v${{ github.run_number }}
          name: OpenWrt 360 V6 (${{ env.BUILD_DATE }})
          body: |
            ## 📦 OpenWrt for 360 V6 (Qualcomm IPQ60xx)
            - **版本**: OpenWrt 24.10 (Stable)
            - **构建时间**: ${{ env.BUILD_DATE }}
            - **源码 Commit**: ${{ env.OPENWRT_COMMIT }}

            ### ✨ 已内置
            - ✅ 中文界面 + Argon 主题
            - ✅ HomeProxy + sing-box (已根除 choice 冲突)
            - ✅ ttyd 网页终端
            - ✅ USB 3.0 驱动 + ath11k 无线
          files: ${{ env.FIRMWARE_PATH }}/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: openwrt/build.log
          retention-days: 7
