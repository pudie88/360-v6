name: Build OpenWrt for 360 V6
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/openwrt-builder.yml'
      - '.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🗑️ Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3 python3-pip rsync swig unzip zlib1g-dev wget curl ca-certificates file

      - name: 📥 Clone Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: 📦 Install Custom Packages
        run: |
          cd openwrt
          rm -rf package/luci-theme-argon package/homeproxy
          git clone --depth 1 https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon
          git clone --depth 1 https://github.com/immortalwrt/homeproxy.git package/homeproxy

      - name: 🔄 Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ⚙️ Apply Config & Hard-Lock Device
        run: |
          cd openwrt
          
          # 1. 彻底删除 sing-box-tiny 冲突项
          find feeds -name "Makefile" -path "*/net/sing-box/*" | xargs sed -i '/define Package\/sing-box-tiny/,/endef/d'
          
          # 2. 载入基础配置
          cp ../.config .config
          
          # 3. 【关键】清除所有已存在的设备选择，防止 Kconfig 冲突导致回退到 mango-dvk
          sed -i '/CONFIG_TARGET_.*_DEVICE_.*/d' .config
          
          # 4. 使用 scripts/config 强制注入设备链 (从大到小)
          ./scripts/config --set-val CONFIG_TARGET_qualcommax y
          ./scripts/config --set-val CONFIG_TARGET_qualcommax_ipq60xx y
          ./scripts/config --set-val CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6 y
          
          # 5. 锁定 HomeProxy 依赖
          ./scripts/config --set-val CONFIG_PACKAGE_sing-box y
          ./scripts/config --set-val CONFIG_PACKAGE_sing-box-tiny n
          
          # 6. 执行 olddefconfig 补全依赖 (此时设备已在 .config 中唯一，不会被重置)
          make olddefconfig
          
          # 7. 最终暴力校验：如果还是被改了，直接强行覆盖 .config
          if ! grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "❌ 警告：设备再次被重置！尝试强制覆盖..."
            echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" >> .config
          fi
          
          # 打印结果以供检查
          echo "--- Final Target Configuration ---"
          grep "CONFIG_TARGET_.*_DEVICE_" .config
          
          if ! grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "❌ 致命错误：目标设备锁定彻底失败！"
            exit 1
          fi

      - name: ⬇️ Download Feeds & Packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 🔨 Compile Firmware
        id: compile
        run: |
          cd openwrt
          if make -j$(nproc) V=s 2>&1 | tee build.log; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 多线程失败，尝试单线程..."
            if make -j1 V=s 2>&1 | tee -a build.log; then
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "status=failure" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

      - name: 📦 Prepare Artifacts
        if: steps.compile.outputs.status == 'success'
        run: |
          TARGET_DIR=$(find openwrt/bin/targets/qualcommax/ipq60xx -maxdepth 1 -type d | head -1)
          mkdir -p "$TARGET_DIR/output"
          cd "$TARGET_DIR"
          cp *qihoo_360v6* output/ 2>/dev/null || true
          cp sha256sums output/ 2>/dev/null || true
          echo "FIRMWARE_PATH=$PWD/output" >> $GITHUB_ENV

      - name: 🚀 Upload to Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-v${{ github.run_number }}
          name: OpenWrt 360 V6 (${{ env.BUILD_DATE }})
          body: |
            ## 📦 OpenWrt for 360 V6 (Qualcomm IPQ60xx)
            - **版本**: OpenWrt 24.10 (Stable)
            - **构建时间**: ${{ env.BUILD_DATE }}
            - **源码 Commit**: ${{ env.OPENWRT_COMMIT }}
          files: ${{ env.FIRMWARE_PATH }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: openwrt/build.log
