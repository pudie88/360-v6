name: Build OpenWrt for 360 V6 (Fixed)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'configs/**'
      - '.github/workflows/build-360v6-fixed.yml'

env:
  # ✅ 解决 Node.js 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: configs/Qihoo-V6.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v5

      - name: 🗑️ Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get autoremove -y --purge
          sudo apt-get clean
          df -h

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-pip rsync \
            swig unzip zlib1g-dev wget curl ca-certificates
          sudo timedatectl set-timezone "$TZ"

      - name: 📥 Clone OpenWrt Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: ⚙️ Configure Target
        run: |
          cd openwrt
          cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
          make defconfig
          echo "=== Target Config ==="
          grep "CONFIG_TARGET.*360" .config || echo "⚠️ No 360 config found"

      - name: 🔄 Update Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 📦 Install Plugins (curl+tar method)
        run: |
          cd openwrt
          
          # ✅ 关键：使用 curl+tar 避免 git 认证问题
          export GIT_TERMINAL_PROMPT=0
          
          # PassWall
          if grep -q "CONFIG_PACKAGE_luci-app-passwall=y" .config; then
            echo ">>> Installing PassWall via curl..."
            mkdir -p package/luci-app-passwall
            curl -L -s https://github.com/xiaorouji/openwrt-passwall/archive/refs/heads/main.tar.gz | \
              tar -xzf - -C package/luci-app-passwall --strip-components=1
          fi
          
          # AdGuardHome
          if grep -q "CONFIG_PACKAGE_luci-app-adguardhome=y" .config; then
            echo ">>> Installing AdGuardHome via curl..."
            mkdir -p package/luci-app-adguardhome
            curl -L -s https://github.com/rufengsuixing/luci-app-adguardhome/archive/refs/heads/master.tar.gz | \
              tar -xzf - -C package/luci-app-adguardhome --strip-components=1
          fi
          
          # Argon Theme
          echo ">>> Installing Argon theme..."
          rm -rf package/lean/luci-theme-argon 2>/dev/null || true
          mkdir -p package/luci-theme-argon
          curl -L -s https://github.com/jerrykuku/luci-theme-argon/archive/refs/heads/master.tar.gz | \
            tar -xzf - -C package/luci-theme-argon --strip-components=1

      - name: ⬇️ Download Packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 🔨 Compile Firmware
        id: compile
        run: |
          cd openwrt
          echo "🔨 Starting compilation with $(nproc) threads..."
          
          # 编译并实时输出日志
          make -j$(nproc) V=s 2>&1 | tee build.log
          
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Compilation successful!"
          else
            echo "❌ Compilation failed!"
            echo "=== Last 100 lines of build.log ==="
            tail -100 build.log
            exit 1
          fi

      - name: 📦 Prepare Firmware
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
          echo "=== Firmware Files ==="
          ls -lh *.bin 2>/dev/null || echo "⚠️ No .bin files found"

      - name: 📤 Upload to Artifacts
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v5
        with:
          name: OpenWrt-360V6-${{ github.run_number }}
          path: ${{ env.FIRMWARE_PATH }}/*.bin
          retention-days: 7

      - name: 🚀 Upload to Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: ${{ env.FIRMWARE_PATH }}/*squashfs*.bin
          body: |
            ## OpenWrt for 360 V6 (Qualcomm IPQ60xx)
            - Branch: ${{ env.REPO_BRANCH }}
            - Build: ${{ github.run_number }}
            - Date: $(date '+%Y-%m-%d')
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Upload Build Log (Always)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-log-${{ github.run_number }}
          path: openwrt/build.log
          retention-days: 3
          if-no-files-found: ignore
