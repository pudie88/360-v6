name: OpenWrt Builder

on:
  push:
    branches:
      - main
    paths:
      - '.config'
      - '.github/workflows/*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual build trigger'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug configuration
        run: |
          echo "=== Configuration Debug ==="
          grep -E "^(CONFIG_TARGET_ROOTFS_PARTSIZE=|CONFIG_PACKAGE_sing-box=|CONFIG_PACKAGE_dockerd=|CONFIG_PACKAGE_samba4-server=|CONFIG_PACKAGE_adguardhome=|CONFIG_PACKAGE_lucky=)" .config || true
          echo "=== Key config values ==="
          echo "PARTSIZE: $(grep '^CONFIG_TARGET_ROOTFS_PARTSIZE=' .config || echo 'NOT FOUND')"
          echo "sing-box: $(grep '^CONFIG_PACKAGE_sing-box=' .config || echo 'NOT FOUND')"

      - name: Validate PARTSIZE for 70MB build
        run: |
          if ! grep -q "^CONFIG_TARGET_ROOTFS_PARTSIZE=20" .config; then
            echo "❌ PARTSIZE is not 20"
            grep "PARTSIZE" .config || echo "(not found)"
            exit 1
          fi
          echo "✅ PARTSIZE=20 validated (extreme minimal)"

      - name: Validate sing-box is retained
        run: |
          if grep -q "^CONFIG_PACKAGE_sing-box=y" .config; then
            echo "✅ sing-box is enabled"
          else
            echo "❌ sing-box is not enabled"
            exit 1
          fi

      - name: Calculate config size
        run: |
          echo "=== Configuration Summary ==="
          # 计算启用的包数量
          enabled_count=$(grep "=y$" .config | wc -l)
          disabled_count=$(grep "=n$" .config | wc -l)
          
          echo "Enabled packages: $enabled_count"
          echo "Disabled packages: $disabled_count"
          
          # 检查是否有重型包
          echo "=== Heavy packages check ==="
          for pkg in dockerd samba4-server adguardhome lucky; do
            if grep -q "^CONFIG_PACKAGE_\${pkg}=y" .config; then
              echo "❌ $pkg is ENABLED (should be disabled)"
            else
              echo "✅ $pkg is disabled"
            fi
          done

  simulate-build:
    needs: validate-config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Simulation success
        run: |
          echo "🎉 配置验证成功！"
          echo "📊 70MB精简配置已通过所有检查"
          echo "📦 可以开始本地编译或使用其他构建平台"
          echo ""
          echo "📋 下一步："
          echo "  1. 配置已推送到 https://github.com/pudie88/360-v6"
          echo "  2. 使用 OpenWrt ImageBuilder 进行本地编译"
          echo "  3. 或使用第三方 CI 服务进行完整构建"
