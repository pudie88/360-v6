name: Build OpenWrt for 360 V6

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/openwrt-builder.yml'
      - '.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🗑️ Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile
          df -h

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-pip rsync \
            swig unzip zlib1g-dev wget curl ca-certificates file

      - name: 📥 Clone Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: 📦 Install Custom Packages
        run: |
          cd openwrt

          # Argon 主题
          rm -rf package/luci-theme-argon
          git clone --depth 1 --branch master --single-branch \
            https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon

          # HomeProxy（只有 master 分支）
          rm -rf package/homeproxy
          git clone --depth 1 --branch master --single-branch \
            https://github.com/immortalwrt/homeproxy.git package/homeproxy

      - name: 🔄 Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ⚙️ Apply .config
        run: |
          cd openwrt

          # 第一步：生成完整默认配置（此时 feeds 已安装，设备列表完整）
          make defconfig

          # 第二步：追加自定义配置（后写的行会在第二次 defconfig 时覆盖默认值）
          cat $GITHUB_WORKSPACE/.config >> .config

          # 第三步：再次 defconfig，让追加的配置生效并补全依赖
          make defconfig

          # 验证目标设备
          if ! grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "❌ 目标设备配置丢失，当前设备配置："
            grep "CONFIG_TARGET_.*DEVICE.*=y" .config || echo "（无设备配置）"
            exit 1
          fi
          echo "✅ 目标设备锁定成功"
          grep "CONFIG_TARGET_" .config | grep "=y"

      - name: ⬇️ Download Feeds & Packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 🔨 Compile Firmware
        id: compile
        run: |
          cd openwrt
          echo "🔨 开始编译 ($(nproc) 线程)..."
          if make -j$(nproc) V=s 2>&1 | tee build.log; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ 编译成功！"
          else
            echo "⚠️ 多线程失败，降级单线程重试..."
            if make -j1 V=s 2>&1 | tee -a build.log; then
              echo "status=success" >> $GITHUB_OUTPUT
              echo "✅ 单线程编译成功！"
            else
              echo "status=failure" >> $GITHUB_OUTPUT
              echo "❌ 编译失败！"
              exit 1
            fi
          fi

      - name: 📦 Prepare Artifacts
        if: steps.compile.outputs.status == 'success'
        run: |
          TARGET_DIR=$(find openwrt/bin/targets -mindepth 2 -maxdepth 2 -type d | head -1)
          mkdir -p "$TARGET_DIR/output"
          cd "$TARGET_DIR"
          cp *qihoo_360v6* output/ 2>/dev/null || true
          cp sha256sums output/ 2>/dev/null || true
          if [ -z "$(ls output/ 2>/dev/null)" ]; then
            echo "❌ 未找到 360 V6 固件文件！"
            ls -la
            exit 1
          fi
          echo "✅ 固件文件："
          ls -lh output/
          echo "FIRMWARE_PATH=$PWD/output" >> $GITHUB_ENV

      - name: 🚀 Upload to Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-v${{ github.run_number }}
          name: OpenWrt 360 V6 (${{ env.BUILD_DATE }})
          body: |
            ## 📦 OpenWrt for 360 V6 (Qualcomm IPQ60xx)
            - **版本**: OpenWrt 24.10 (Stable)
            - **构建时间**: ${{ env.BUILD_DATE }}
            - **源码 Commit**: ${{ env.OPENWRT_COMMIT }}

            ### ✨ 已包含功能
            - ✅ 中文界面 + Argon 主题
            - ✅ HomeProxy + Sing-Box（代理）
            - ✅ ttyd 网页终端
            - ✅ USB 驱动（DWC3）
            - ✅ ath11k 无线驱动

            ### ⚠️ 刷机说明
            1. **首刷**：使用 `*-factory.ubi` 通过原厂界面刷入
            2. **升级**：使用 `*-sysupgrade.bin` 通过 LuCI 升级
            3. 默认 IP：`192.168.1.1`
            4. 用户名：`root` / 密码：**空**
          files: ${{ env.FIRMWARE_PATH }}/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: openwrt/build.log
          retention-days: 7
