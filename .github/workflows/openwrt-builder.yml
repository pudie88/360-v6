name: Build OpenWrt for 360 V6

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/openwrt-builder.yml'
      - '.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🗑️ Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3 python3-pip \
            rsync swig unzip zlib1g-dev wget curl ca-certificates file

      - name: 📥 Clone Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: 📦 Install Custom Packages
        run: |
          cd openwrt
          rm -rf package/luci-theme-argon package/homeproxy
          git clone --depth 1 https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon
          git clone --depth 1 https://github.com/immortalwrt/homeproxy.git package/homeproxy
          
      - name: 🔍 Debug Config.in
        run: |
          grep -n "default y\|mango-dvk\|360v6" openwrt/target/linux/qualcommax/ipq60xx/Config.in | head -40

      - name: ⚙️ Apply Config
        run: |
          cd openwrt

          # 1. 移除 sing-box-tiny 冲突
          SINGBOX_MK="feeds/packages/net/sing-box/Makefile"
          if [ -f "$SINGBOX_MK" ]; then
            sed -i '/define Package\/sing-box-tiny/,/^endef/d' "$SINGBOX_MK"
            sed -i '/BuildPackage,sing-box-tiny/d' "$SINGBOX_MK"
            echo "✅ 已移除 sing-box-tiny"
          fi
         
          # 2. 写入种子配置
          printf 'CONFIG_TARGET_qualcommax=y\n' > .config
          printf 'CONFIG_TARGET_qualcommax_ipq60xx=y\n' >> .config
          printf 'CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y\n' >> .config
          printf 'CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_8devices_mango-dvk=n\n' >> .config

          # 3. 验证写入
          echo "--- 种子 .config 内容 ---"
          cat .config

          # 3. 验证写入是否正确（关键调试步骤）
          echo "--- 种子 .config 内容 ---"
          cat .config

          # 4. 第一次 defconfig，锁定设备依赖
          make defconfig 2>&1 | tail -5

          # 5. 校验设备锁定
          if ! grep -q "^CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "❌ 第一次 defconfig 后设备未锁定"
            grep "CONFIG_TARGET_.*_DEVICE_.*=y" .config || echo "（无设备被选中）"
            exit 1
          fi
          echo "✅ 设备锁定成功"

          # 6. 追加包配置（跳过 TARGET 行）
          grep -v "^CONFIG_TARGET_" "${GITHUB_WORKSPACE}/.config" >> .config

          # 7. 第二次 defconfig，处理包依赖
          make defconfig 2>&1 | tail -5

          # 8. 最终校验
          if grep -q "^CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "✅ 目标设备最终确认：qihoo_360v6"
          else
            echo "❌ 设备在第二次 defconfig 后被覆盖"
            grep "CONFIG_TARGET_.*_DEVICE_.*=y" .config
            exit 1
          fi

      - name: ⬇️ Download Packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 🔨 Compile Firmware
        id: compile
        run: |
          cd openwrt
          echo "🔨 开始编译 ($(nproc) 线程)..."
          if make -j$(nproc) 2>&1 | tee build.log; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 多线程失败，降级单线程（附详细日志）..."
            if make -j1 V=s 2>&1 | tee -a build.log; then
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "status=failure" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

      - name: 📦 Prepare Artifacts
        if: steps.compile.outputs.status == 'success'
        run: |
          TARGET_DIR="openwrt/bin/targets/qualcommax/ipq60xx"
          if [ ! -d "$TARGET_DIR" ]; then
            echo "❌ 目标目录不存在，实际输出："
            find openwrt/bin/targets -type d -maxdepth 3
            exit 1
          fi

          cd "$TARGET_DIR"
          echo "📂 输出文件列表："
          ls -lh

          mkdir -p output
          cp *360v6* output/ 2>/dev/null || true
          cp sha256sums output/ 2>/dev/null || true

          if ! ls output/*360v6* >/dev/null 2>&1; then
            echo "❌ 未找到 360 V6 固件，请检查编译日志"
            exit 1
          fi

          echo "✅ 固件验证通过"
          ls -lh output/
          echo "FIRMWARE_PATH=$PWD/output" >> $GITHUB_ENV

      - name: 🚀 Upload to Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-v${{ github.run_number }}
          name: OpenWrt 360 V6 (${{ env.BUILD_DATE }})
          body: |
            ## 📦 OpenWrt for 360 V6 (Qualcomm IPQ60xx)
            - **版本**: OpenWrt 24.10 (Stable)
            - **构建时间**: ${{ env.BUILD_DATE }}
            - **源码 Commit**: ${{ env.OPENWRT_COMMIT }}

            ### ✨ 已内置
            - ✅ 中文界面 + Argon 主题
            - ✅ HomeProxy + sing-box
            - ✅ ttyd 网页终端
            - ✅ USB 3.0 驱动 + ath11k 无线
          files: ${{ env.FIRMWARE_PATH }}/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: openwrt/build.log
          retention-days: 7
