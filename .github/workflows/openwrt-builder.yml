name: Build OpenWrt for 360 V6

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/openwrt-builder.yml'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10   # ✅ 锁定稳定版
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🗑️ Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile
          df -h

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-pip rsync \
            swig unzip zlib1g-dev wget curl ca-certificates file

      - name: 📥 Clone Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: 📦 Install Custom Packages
        run: |
          cd openwrt

          # 1. 下载 Argon 主题
          rm -rf package/luci-theme-argon 2>/dev/null || true
          git clone --depth 1 --branch master --single-branch https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon

          # 2. 克隆 HomeProxy (✅ 已修正：分支改为 openwrt-24.10 匹配稳定版)
          rm -rf package/homeproxy 2>/dev/null || true
          git clone --depth 1 --branch openwrt-24.10 --single-branch https://github.com/immortalwrt/homeproxy.git package/homeproxy

      - name: 🔄 Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ⚙️ Configure Target & Packages (CRITICAL STEP)
        run: |
          cd openwrt

          # 1. 生成基础配置
          {
            echo "CONFIG_TARGET_qualcommax=y"
            echo "CONFIG_TARGET_qualcommax_ipq60xx=y"
            echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y"  # 🔒 锁定 360 V6
            
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=115"                      # ⚠️ 128M 闪存安全值
            echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y"                        # NAND 必须用 squashfs
            echo "CONFIG_CCACHE=y"
            echo "CONFIG_SSTRIP=y"

            # --- 界面与语言 ---
            echo "CONFIG_PACKAGE_luci=y"
            echo "CONFIG_PACKAGE_luci-base=y"
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lib-ipkg=y"
            echo "CONFIG_PACKAGE_luci-ssl=y"
            echo "CONFIG_LUCI_LANG_zh-cn=y"
            echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y"
            
            # --- 内置插件 ---
            echo "CONFIG_PACKAGE_luci-app-adblock=y"
            echo "CONFIG_PACKAGE_luci-i18n-adblock-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-app-ttyd=y"
            echo "CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y"
            echo "CONFIG_PACKAGE_kmod-usb-printer=y"
            echo "CONFIG_PACKAGE_p910nd=y"
            echo "CONFIG_PACKAGE_luci-app-p910nd=y"
            echo "CONFIG_PACKAGE_luci-i18n-p910nd-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-app-homeproxy=y"
            echo "CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y"
            echo "CONFIG_PACKAGE_sing-box=y"
            echo "CONFIG_PACKAGE_sing-box-geosite=y"
            echo "CONFIG_PACKAGE_sing-box-geoip=y"
            
            # --- 网络与驱动 ---
            echo "CONFIG_PACKAGE_dnsmasq-full=y"
            echo "CONFIG_PACKAGE_firewall4=y"
            echo "CONFIG_PACKAGE_nftables=y"
            echo "CONFIG_PACKAGE_kmod-ath11k=y"
            echo "CONFIG_PACKAGE_ath11k-firmware-qcn9074=y"
            echo "CONFIG_PACKAGE_kmod-usb-dwc3=y"
            
            # --- 基础工具 ---
            echo "CONFIG_PACKAGE_htop=y"
            echo "CONFIG_PACKAGE_bash=y"
            echo "CONFIG_PACKAGE_curl=y"

          } > .config

          # 2. 执行 defconfig
          make defconfig

          # 3. 🔒 双重锁定机制：防止 defconfig 后目标设备被重置
          grep "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config || {
            echo "⚠️ 警告：目标配置丢失，正在强制修复..."
            grep -v "^CONFIG_TARGET_" .config > .config.tmp
            {
              echo "CONFIG_TARGET_qualcommax=y"
              echo "CONFIG_TARGET_qualcommax_ipq60xx=y"
              echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y"
            } >> .config.tmp
            mv .config.tmp .config
            make defconfig
          }

          # 4. 最终验证
          echo "📋 最终目标验证："
          grep "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config && echo "✅ 锁定成功" || echo "❌ 锁定失败，终止编译"

      - name: ⬇️ Download Feeds & Packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 🔨 Compile Firmware
        id: compile
        run: |
          cd openwrt
          echo "🔨 开始编译 (多线程)..."
          make -j$(nproc) V=s 2>&1 | tee build.log

          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ 编译成功！"
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "❌ 编译失败！"
            exit 1
          fi

      - name: 📦 Prepare Artifacts
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets/*/*
          mkdir -p output
          cp *qihoo_360v6* output/ 2>/dev/null || true
          cp *factory* output/ 2>/dev/null || true
          cp *sysupgrade* output/ 2>/dev/null || true
          cp sha256sums output/ 2>/dev/null || true
          echo "FIRMWARE_PATH=$PWD/output" >> $GITHUB_ENV

      - name: 🚀 Upload to Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-v${{ github.run_number }}
          name: OpenWrt 360 V6 (${{ env.BUILD_DATE }})
          body: |
            ## 📦 OpenWrt for 360 V6 (Qualcomm IPQ60xx)
            - **版本**: OpenWrt 24.10 (Stable)
            - **构建时间**: ${{ env.BUILD_DATE }}
            - **源码 Commit**: ${{ env.OPENWRT_COMMIT }}

            ### ✨ 特性
            - ✅ 默认中文界面 + Argon 主题
            - ✅ HomeProxy + Sing-Box
            - ✅ Adblock 去广告
            - ✅ p910nd 打印机支持
            - ✅ USB 3.0 驱动支持

            ### ⚠️ 刷机指南
            1. 刷入 `*.ubi` (Factory) 或 `*.bin` (Sysupgrade)
            2. 刷入后默认 IP: 192.168.1.1
            3. 用户名: root / 密码: 空
          files: |
            ${{ env.FIRMWARE_PATH }}/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: openwrt/build.log
          retention-days: 7
