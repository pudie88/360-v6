name: Build OpenWrt for 360 V6

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/openwrt-builder.yml'
      - '.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🗑️ Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
          sudo docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get autoremove -y --purge && sudo apt-get clean
          sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3 python3-pip rsync swig unzip zlib1g-dev wget curl ca-certificates file

      - name: 📥 Clone Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: 📦 Install Custom Packages
        run: |
          cd openwrt
          rm -rf package/luci-theme-argon package/homeproxy
          git clone --depth 1 https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon
          git clone --depth 1 https://github.com/immortalwrt/homeproxy.git package/homeproxy

      - name: 🔄 Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ⚙️ Apply Config & Hard-Lock Device
        run: |
          cd openwrt

          # 1. 精准删除 sing-box-tiny（Python 按行解析，避免正则误伤）
          SINGBOX_MK="$(find feeds -name 'Makefile' -path '*/net/sing-box/*' | head -1)"
          if [ -n "$SINGBOX_MK" ]; then
            python3 - "$SINGBOX_MK" <<'PYEOF'
          import sys
          path = sys.argv[1]
          with open(path, "r") as f:
              lines = f.readlines()
          new_lines = []
          skip = False
          for line in lines:
              stripped = line.strip()
              if stripped.startswith("define Package/sing-box-tiny"):
                  skip = True
                  continue
              if skip and stripped == "endef":
                  skip = False
                  continue
              if not skip and "BuildPackage,sing-box-tiny" not in line:
                  new_lines.append(line)
          with open(path, "w") as f:
              f.writelines(new_lines)
          print(f"✅ Patched: {path}")
          PYEOF
          fi

          # 2. 载入仓库配置
          cp $GITHUB_WORKSPACE/.config .config

          # 3. 【防御】追加设备配置到末尾（防 defconfig 重置 choice）
          cat >> .config << 'EOF'
          # === Hard-Lock Device (end-of-file priority) ===
          CONFIG_TARGET_MULTI_PROFILE=n
          CONFIG_TARGET_DEVICE="qihoo_360v6"
          CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y
          EOF

          # 4. 仅执行一次 defconfig 补全依赖
          echo "🔄 执行 make defconfig ..."
          make defconfig 2>&1 | grep -iE "error|override.*choice" || true

          # 5. 最终校验
          echo "--- Final Device Config ---"
          grep "CONFIG_TARGET_.*_DEVICE_" .config || echo "(none)"

          if ! grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y" .config; then
            echo "❌ 致命错误：目标设备锁定失败！"
            exit 1
          fi
          echo "✅ 目标设备 100% 锁定：qihoo_360v6"

      - name: ⬇️ Download Feeds & Packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 🔨 Compile Firmware
        id: compile
        run: |
          cd openwrt
          echo "🔨 开始编译 ($(nproc) 线程)..."
          if make -j$(nproc) V=s 2>&1 | tee build.log; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 多线程失败，尝试单线程..."
            if make -j1 V=s 2>&1 | tee -a build.log; then
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "status=failure" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

      - name: 📦 Prepare Artifacts
        if: steps.compile.outputs.status == 'success'
        run: |
          TARGET_DIR=$(find openwrt/bin/targets/qualcommax/ipq60xx -maxdepth 1 -type d | head -1)
          mkdir -p "$TARGET_DIR/output"
          cd "$TARGET_DIR"
          cp *qihoo_360v6* output/ 2>/dev/null || true
          cp sha256sums output/ 2>/dev/null || true
          if [ -z "$(ls output/ 2>/dev/null)" ]; then
            echo "❌ 未找到 360 V6 固件文件！"
            exit 1
          fi
          echo "✅ 固件文件："
          ls -lh output/
          echo "FIRMWARE_PATH=$PWD/output" >> $GITHUB_ENV

      - name: 🚀 Upload to Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-v${{ github.run_number }}
          name: OpenWrt 360 V6 (${{ env.BUILD_DATE }})
          body: |
            ## 📦 OpenWrt for 360 V6 (Qualcomm IPQ60xx)
            - **版本**: OpenWrt 24.10 (Stable)
            - **构建时间**: ${{ env.BUILD_DATE }}
            - **源码 Commit**: ${{ env.OPENWRT_COMMIT }}

            ### ✨ 已内置
            - ✅ 中文界面 + Argon 主题
            - ✅ HomeProxy + sing-box (已解决 choice 冲突)
            - ✅ ttyd 网页终端
            - ✅ USB 3.0 驱动 + ath11k 无线
          files: ${{ env.FIRMWARE_PATH }}/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: openwrt/build.log
          retention-days: 7
